parameters:
  AppleDeveloperUsername: ''
  AppleAppSpecificPassword: ''
  AppleTeamID: ''
  AppleAppIdentifier: ''
  ProvisioningProfileSecureFile: ''  # Name of the provisioning profile file
  CertificateSecureFile: ''         # Name of the distribution certificate file
  DeploymentPackagePath: ''         # Path to the deployment package (IPA file)
  AppVersion: '1.0.0'
  BuildConfiguration: 'Release'
  XcodeScheme: 'YourAppScheme'
  MAUIProjectPath: 'YourMAUIProject.sln'

steps:
  # Build the MAUI iOS app
  - task: DotNetCoreCLI@2
    displayName: 'Build MAUI iOS project'
    inputs:
      command: build
      projects: ${{ parameters.MAUIProjectPath }}
      arguments: '--configuration $(BuildConfiguration) -p:Platform=iOS'

  # Publish the iOS app (This will create the IPA file)
  - task: DotNetCoreCLI@2
    displayName: 'Publish MAUI iOS app'
    inputs:
      command: publish
      projects: ${{ parameters.MAUIProjectPath }}
      arguments: '--configuration $(BuildConfiguration) -p:Platform=iOS /p:BuildIpa=true'
      publishWebProjects: false
      zipAfterPublish: false

  # Download the provisioning profile and certificate for signing
  - task: DownloadSecureFile@1
    displayName: 'Download Provisioning Profile'
    inputs:
      secureFile: ${{ parameters.ProvisioningProfileSecureFile }}

  - task: DownloadSecureFile@1
    displayName: 'Download Distribution Certificate'
    inputs:
      secureFile: ${{ parameters.CertificateSecureFile }}

  # Sign the app with the downloaded provisioning profile and certificate
  - script: |
      mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      cp "$(Agent.TempDirectory)/$(ProvisioningProfileSecureFile)" ~/Library/MobileDevice/Provisioning\ Profiles/
      security import "$(Agent.TempDirectory)/$(CertificateSecureFile)" -k ~/Library/Keychains/login.keychain
      security unlock-keychain -p "" ~/Library/Keychains/login.keychain
      export DEVELOPMENT_TEAM="${{ parameters.AppleTeamID }}"
      export APPLE_ID="${{ parameters.AppleDeveloperUsername }}"
    displayName: 'Sign the MAUI iOS app'

  # Build IPA (if not done before)
  - script: |
      dotnet publish ${{ parameters.MAUIProjectPath }} -c $(BuildConfiguration) -p:Platform=iOS -o $(Build.ArtifactStagingDirectory)
    displayName: 'Build IPA File'

  # Upload the IPA file to TestFlight using altool
  - script: |
      xcrun altool --upload-app -f "$(Build.ArtifactStagingDirectory)/YourApp.ipa" -t ios -u ${{ parameters.AppleDeveloperUsername }} -p ${{ parameters.AppleAppSpecificPassword }}
    displayName: 'Upload to TestFlight'
    env:
      APPLE_ID: ${{ parameters.AppleDeveloperUsername }}
      APP_SPECIFIC_PASSWORD: ${{ parameters.AppleAppSpecificPassword }}

  # Optional: Notify completion
  - script: |
      echo "Deployment to TestFlight completed successfully!"
    displayName: 'Notify Deployment Completion'
